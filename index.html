<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sales Rep Application — Franco Fleet Services</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Barlow:wght@400;500;600;700&family=Barlow+Semi+Condensed:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0d1014;--surface:#151a21;--surface-2:#1c232c;--line:#2a323d;
    --text:#eef1f4;--muted:#8a95a3;--amber:#ff6400;--amber-dim:#c24d00;
    --green:#3ec46d;--red:#e2543f;--radius:10px;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;font-size:18px;-webkit-font-smoothing:antialiased;overflow:hidden}
  body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
    background:radial-gradient(900px 600px at 78% -10%,rgba(255,100,0,.10),transparent 60%),radial-gradient(700px 500px at -10% 110%,rgba(62,196,109,.05),transparent 55%)}
  .topbar{position:fixed;top:0;left:0;right:0;z-index:20;display:flex;align-items:center;justify-content:space-between;
    padding:16px 26px;background:rgba(13,16,20,.72);backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
  .brand{display:flex;align-items:center;gap:9px;font-family:'Anton',sans-serif;letter-spacing:.06em;font-size:15px}
  .brand .dot{width:9px;height:9px;border-radius:50%;background:var(--amber);box-shadow:0 0 12px var(--amber)}
  .brandlogo{height:28px;width:auto;display:block}
  .brand small{color:var(--muted);font-family:'Barlow Semi Condensed';letter-spacing:.18em;font-weight:600;font-size:10px;text-transform:uppercase}
  .tag{display:inline-flex;align-items:center;gap:7px;color:var(--amber);background:rgba(255,100,0,.1);border:1px solid var(--amber-dim);font-family:'Barlow Semi Condensed';letter-spacing:.16em;font-weight:600;font-size:11px;text-transform:uppercase;padding:6px 13px;border-radius:30px}
  .tag .pulse{width:7px;height:7px;border-radius:50%;background:var(--amber);animation:tagpulse 1.8s infinite}
  @keyframes tagpulse{0%{box-shadow:0 0 0 0 rgba(255,100,0,.6)}70%{box-shadow:0 0 0 7px rgba(255,100,0,0)}100%{box-shadow:0 0 0 0 rgba(255,100,0,0)}}
  .progress{position:fixed;top:57px;left:0;right:0;height:3px;background:var(--surface);z-index:19}
  .progress .bar{height:100%;width:0;background:var(--amber);transition:width .45s cubic-bezier(.4,0,.2,1)}
  .stage{position:relative;z-index:1;height:100%;display:flex;align-items:center;justify-content:center;padding:90px 24px 40px}
  .card{width:100%;max-width:660px}
  .step{display:none;animation:rise .5s cubic-bezier(.16,1,.3,1)}
  .step.active{display:block}
  @keyframes rise{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:none}}
  .qnum{font-family:'Barlow Semi Condensed';font-weight:600;color:var(--amber);letter-spacing:.12em;font-size:13px;display:flex;align-items:center;gap:7px;margin-bottom:14px}
  .qnum svg{width:13px;height:13px}
  .qtext{font-size:30px;line-height:1.18;font-weight:600;margin-bottom:6px;letter-spacing:-.01em}
  .qhint{color:var(--muted);font-size:15px;margin-bottom:26px}
  .qtext + .qhint{margin-top:8px}
  .field{width:100%;background:transparent;border:none;border-bottom:2px solid var(--line);color:var(--text);font-family:'Barlow';font-size:24px;padding:10px 2px;transition:.2s}
  .field::placeholder{color:#4a5462}
  .field:focus{outline:none;border-color:var(--amber)}
  .phonewrap{display:flex;gap:12px;align-items:stretch}
  .ccsel{position:relative;flex:none}
  .ccsel select{appearance:none;-webkit-appearance:none;background:var(--surface);border:1.5px solid var(--line);border-radius:var(--radius);
    color:var(--text);font-family:'Barlow';font-size:20px;font-weight:600;padding:10px 38px 10px 16px;cursor:pointer;height:100%;transition:.2s}
  .ccsel select:focus{outline:none;border-color:var(--amber)}
  .ccsel::after{content:"";position:absolute;right:15px;top:50%;transform:translateY(-30%);border:5px solid transparent;border-top-color:var(--muted);pointer-events:none}
  .phonewrap .field{flex:1;font-size:24px}
  .phonehint{color:var(--muted);font-size:13px;margin-top:10px;font-family:'Barlow Semi Condensed';letter-spacing:.04em}
  textarea.field{resize:none;line-height:1.45;font-size:20px;border:1px solid var(--line);border-radius:var(--radius);padding:14px 16px;min-height:150px}
  textarea.field:focus{border-color:var(--amber)}
  .choices{display:flex;flex-direction:column;gap:11px}
  .choice{display:flex;align-items:center;gap:14px;background:var(--surface);border:1.5px solid var(--line);border-radius:var(--radius);padding:15px 18px;cursor:pointer;transition:.16s;user-select:none}
  .choice:hover{border-color:#3c4654;background:var(--surface-2)}
  .choice .key{width:26px;height:26px;flex:none;border:1.5px solid var(--line);border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:'Barlow Semi Condensed';font-weight:600;font-size:13px;color:var(--muted);transition:.16s}
  .choice .ctxt{font-size:18px;font-weight:500}
  .choice.sel{border-color:var(--amber);background:rgba(255,100,0,.08)}
  .choice.sel .key{background:var(--amber);border-color:var(--amber);color:#1a1205}
  .choice.multi .key{border-radius:50%}
  .scale{display:flex;gap:10px}
  .scale .sc{flex:1;background:var(--surface);border:1.5px solid var(--line);border-radius:var(--radius);padding:18px 0;text-align:center;cursor:pointer;transition:.16s;font-family:'Anton';font-size:24px;color:var(--muted)}
  .scale .sc:hover{border-color:#3c4654}
  .scale .sc.sel{border-color:var(--amber);background:rgba(255,100,0,.10);color:var(--amber)}
  .scalelabels{display:flex;justify-content:space-between;color:var(--muted);font-size:12.5px;margin-top:10px;font-family:'Barlow Semi Condensed';letter-spacing:.04em;text-transform:uppercase}
  .actions{display:flex;align-items:center;gap:16px;margin-top:30px}
  .btn{background:var(--amber);color:#1a1205;border:none;border-radius:8px;font-family:'Barlow';font-weight:700;font-size:17px;padding:13px 26px;cursor:pointer;display:inline-flex;align-items:center;gap:9px;transition:.16s}
  .btn:hover{background:#ff8124;transform:translateY(-1px)}
  .btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
  .enterhint{color:var(--muted);font-size:13px;font-family:'Barlow Semi Condensed';letter-spacing:.04em}
  .enterhint b{color:var(--text);font-weight:600}
  .back{background:none;border:none;color:var(--muted);cursor:pointer;font-family:'Barlow';font-size:14px;display:inline-flex;align-items:center;gap:5px;margin-left:auto;transition:.16s}
  .back:hover{color:var(--text)}
  .err{color:var(--red);font-size:14px;margin-top:12px;min-height:18px;font-weight:500}
  .welcome .kicker{font-family:'Barlow Semi Condensed';font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--amber);font-size:13px;margin-bottom:18px}
  .welcome h1{font-family:'Anton';font-size:clamp(40px,7vw,68px);line-height:.95;letter-spacing:.01em;text-transform:uppercase;margin-bottom:22px}
  .welcome h1 em{font-style:normal;color:var(--amber)}
  .welcome p{color:#c3cbd5;font-size:19px;line-height:1.55;max-width:560px;margin-bottom:14px}
  .welcome .warn{color:var(--muted);font-size:15.5px;border-left:2px solid var(--amber-dim);padding-left:14px;margin:24px 0 30px}
  .meta{display:flex;gap:24px;color:var(--muted);font-size:13px;font-family:'Barlow Semi Condensed';letter-spacing:.06em;text-transform:uppercase;margin-top:6px}
  .meta b{color:var(--text)}
  .hazard{height:10px;background:repeating-linear-gradient(45deg,var(--amber) 0 16px,#1a1205 16px 32px);border-radius:3px;margin-bottom:34px;opacity:.85}
  .thanks{text-align:center}
  .thanks .check{width:74px;height:74px;border-radius:50%;background:rgba(62,196,109,.12);border:2px solid var(--green);display:flex;align-items:center;justify-content:center;margin:0 auto 26px}
  .thanks .check svg{width:36px;height:36px;stroke:var(--green)}
  .thanks h2{font-family:'Anton';font-size:40px;text-transform:uppercase;margin-bottom:16px}
  .thanks p{color:#c3cbd5;font-size:18px;line-height:1.55;max-width:480px;margin:0 auto 12px}
  .thanks .ps{color:var(--muted);font-size:15px;border-top:1px solid var(--line);padding-top:18px;margin-top:26px;max-width:480px;margin-left:auto;margin-right:auto}
  .sending{display:none;align-items:center;gap:10px;color:var(--muted);font-size:15px}
  .spin{width:18px;height:18px;border:2px solid var(--line);border-top-color:var(--amber);border-radius:50%;animation:sp .7s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}
  @media(max-width:560px){.qtext{font-size:25px}.welcome p{font-size:17px}.scale{gap:6px}.scale .sc{font-size:20px;padding:14px 0}}
</style>

    availability:{t:"Availability?",o:["Full-time","Part-time"]},
    why_you:{t:"In one sentence: why should we pick you over another rep?",ph:"Because..."},
    contact_link:{t:"Paste your LinkedIn or a link to your resume.",h:"A URL works fine.",ph:"https://linkedin.com/in/..."}
  },
  ui:{ok:'OK',next:'Next',enter:'press <b>Enter ↵</b>',back:'Back',
    reqText:'Please fill this in.',reqChoice:'Please pick an option.',reqEmail:'Enter a valid email.',
    reqPhone:'Please enter your phone number.',
    reqPhoneLen:'A {c} number needs {n} digits.',
    sending:'Submitting your application…'},
  thanks:{h:"Application received",
    p:"Thanks — we review every application. If your profile fits, you'll hear from us within a few business days for a short call.",
    ps:"Heads up: that call will start exactly like the cold-call scenario you just answered."}
};

const ICON_ARROW='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M13 6l6 6-6 6"/></svg>';
function activeQuestions(){ return QUESTIONS; }
function numberedIndex(q){ const list=activeQuestions().filter(x=>!['welcome','thankyou'].includes(x.type)); return list.indexOf(q)+1; }
function totalNumbered(){ return activeQuestions().filter(x=>!['welcome','thankyou'].includes(x.type)).length; }

function render(){
  const list=activeQuestions();
  const q=list[step];
  const card=document.getElementById('card');
  const ui=T.ui;
  let html='';

  if(q.type==='welcome'){
    const w=T.welcome;
    html=`<div class="step active welcome">
      <div class="hazard"></div>
      <div class="kicker">${w.kicker}</div>
      <h1>${w.h1[0]}<br>${w.h1[1]}</h1>
      <p>${w.p1}</p><p>${w.p2}</p>
      <div class="warn">${w.warn}</div>
      <div class="actions"><button class="btn" onclick="go(1)">${w.cta} ${ICON_ARROW}</button></div>
      <div class="meta"><span><b>${w.meta[0]}</b></span><span><b>${w.meta[1]}</b></span><span><b>${w.meta[2]}</b></span></div>
    </div>`;
  }
  else if(q.type==='thankyou'){
    const tk=T.thanks;
    html=`<div class="step active thanks">
      <div class="check"><svg viewBox="0 0 24 24" fill="none" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12l5 5L20 6"/></svg></div>
      <h2>${tk.h}</h2><p>${tk.p}</p><p class="ps">${tk.ps}</p>
    </div>`;
  }
  else{
    const qc=T.q[q.id];
    const n=String(numberedIndex(q)).padStart(2,'0');
    let body='';
    if(q.type==='text'){
      const val=answers[q.id]||'';
      body=`<input class="field" id="inp" type="${q.inputType}" value="${esc(val)}" placeholder="${qc.ph||''}" autocomplete="off" oninput="clearErr()" onkeydown="if(event.key==='Enter'){event.preventDefault();go(1)}">`;
    } else if(q.type==='phone'){
      const cur=answers[q.id]||{cc:'US',num:''};
      let opts='';
      COUNTRIES.forEach(c=>{
        const sel=cur.cc===c.code?'selected':'';
        const label=c.dial?`${c.flag} ${c.dial}`:`${c.flag}`;
        opts+=`<option value="${c.code}" ${sel}>${label}</option>`;
      });
      body=`<div class="phonewrap">
          <div class="ccsel"><select id="cc" onchange="clearErr()">${opts}</select></div>
          <input class="field" id="inp" type="tel" inputmode="numeric" value="${esc(cur.num)}" placeholder="${qc.ph||''}" autocomplete="off"
            oninput="this.value=this.value.replace(/[^0-9]/g,'');clearErr()" onkeydown="if(event.key==='Enter'){event.preventDefault();go(1)}">
        </div>
        <div class="phonehint">Digits only — we'll add the country code automatically.</div>`;
    } else if(q.type==='long'){
      const val=answers[q.id]||'';
      body=`<textarea class="field" id="inp" placeholder="${qc.ph||''}" oninput="clearErr()">${esc(val)}</textarea>`;
    } else if(q.type==='single'){
      body='<div class="choices">';
      q.values.forEach((v,i)=>{
        const sel=answers[q.id]===v?'sel':'';
        body+=`<div class="choice ${sel}" onclick="pickSingle('${q.id}','${v}')"><span class="key">${String.fromCharCode(65+i)}</span><span class="ctxt">${qc.o[i]}</span></div>`;
      });
      body+='</div>';
    } else if(q.type==='multi'){
      const cur=answers[q.id]||[];
      body='<div class="choices">';
      q.values.forEach((v,i)=>{
        const sel=cur.includes(v)?'sel':'';
        body+=`<div class="choice multi ${sel}" onclick="pickMulti('${q.id}','${v}')"><span class="key">${sel?'✓':''}</span><span class="ctxt">${qc.o[i]}</span></div>`;
      });
      body+='</div>';
    } else if(q.type==='scale'){
      body='<div class="scale">';
      q.values.forEach(v=>{ const sel=answers[q.id]===v?'sel':''; body+=`<div class="sc ${sel}" onclick="pickSingle('${q.id}',${v})">${v}</div>`; });
      body+=`</div><div class="scalelabels"><span>1 · ${qc.lo}</span><span>${qc.hi} · 5</span></div>`;
    }
    const showEnter=(q.type==='text'||q.type==='long'||q.type==='phone');
    html=`<div class="step active">
      <div class="qnum">${ICON_ARROW} ${n} / ${String(totalNumbered()).padStart(2,'0')}</div>
      <div class="qtext">${qc.t}</div>
      ${qc.h?`<div class="qhint">${qc.h}</div>`:''}
      ${body}
      <div class="err" id="err"></div>
      <div class="actions">
        <button class="btn" id="okbtn" onclick="go(1)">${q.type==='multi'||q.type==='text'||q.type==='long'||q.type==='phone'?ui.next:ui.ok} ${ICON_ARROW}</button>
        ${showEnter?`<span class="enterhint">${ui.enter}</span>`:''}
        <button class="back" onclick="go(-1)"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M11 18l-6-6 6-6"/></svg>${ui.back}</button>
      </div>
    </div>`;
  }
  card.innerHTML=html;
  const inp=document.getElementById('inp'); if(inp){ inp.focus(); }
  updateProgress();
}

function updateProgress(){
  const list=activeQuestions(); const q=list[step]; let pct=0;
  if(q.type==='thankyou') pct=100;
  else if(q.type!=='welcome') pct=(numberedIndex(q)-1)/totalNumbered()*100;
  document.getElementById('bar').style.width=pct+'%';
}

function pickSingle(id,v){ answers[id]=v; clearErr(); render(); setTimeout(()=>go(1),180); }
function pickMulti(id,v){
  let cur=answers[id]||[];
  if(v==='none'){ cur=['none']; }
  else { cur=cur.filter(x=>x!=='none'); cur.includes(v)?cur=cur.filter(x=>x!==v):cur.push(v); }
  answers[id]=cur; clearErr(); render();
}
function clearErr(){ const e=document.getElementById('err'); if(e)e.textContent=''; }
function showErr(msg){ const e=document.getElementById('err'); if(e)e.textContent=msg; }

function captureCurrent(){
  const list=activeQuestions(); const q=list[step];
  if(q.type==='text'||q.type==='long'){ const inp=document.getElementById('inp'); if(inp) answers[q.id]=inp.value.trim(); }
  if(q.type==='phone'){
    const cc=document.getElementById('cc'), inp=document.getElementById('inp');
    if(cc&&inp) answers[q.id]={ cc:cc.value, num:inp.value.replace(/[^0-9]/g,'') };
  }
}
function validateCurrent(){
  const list=activeQuestions(); const q=list[step]; const ui=T.ui;
  if(['welcome','thankyou'].includes(q.type)) return true;
  if(!q.required) return true;
  const a=answers[q.id];
  if(q.type==='text'||q.type==='long'){
    if(!a){ showErr(ui.reqText); return false; }
    if(q.inputType==='email' && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(a)){ showErr(ui.reqEmail); return false; }
  } else if(q.type==='phone'){
    if(!a || !a.num){ showErr(ui.reqPhone); return false; }
    const country=COUNTRIES.find(c=>c.code===a.cc) || COUNTRIES[0];
    if(country.len>0 && a.num.length!==country.len){
      showErr(ui.reqPhoneLen.replace('{n}',country.len).replace('{c}',country.name)); return false;
    }
    if(country.len===0 && a.num.length<6){ showErr(ui.reqPhone); return false; }
  } else if(q.type==='multi'){
    if(!a||!a.length){ showErr(ui.reqChoice); return false; }
  } else {
    if(a===undefined||a===null){ showErr(ui.reqChoice); return false; }
  }
  return true;
}

function go(dir){
  const list=activeQuestions();
  if(dir>0){ captureCurrent(); if(!validateCurrent()) return; }
  const next=step+dir;
  if(next<0) return;
  const target=list[next];
  if(dir>0 && target && target.type==='thankyou'){ submit(); return; }
  if(next>=list.length) return;
  step=next; render();
}

/* ===== SUBMIT — envia para o webhook do n8n ===== */
async function submit(){
  const card=document.getElementById('card');
  card.innerHTML=`<div class="step active"><div class="sending" style="display:flex"><span class="spin"></span>${T.ui.sending}</div></div>`;

  // normaliza telefone para string "+1 5551234567"
  const out = Object.assign({}, answers);
  if(out.phone && typeof out.phone === 'object'){
    const c = COUNTRIES.find(x => x.code === out.phone.cc) || COUNTRIES[0];
    out.phone = ((c.dial ? c.dial + ' ' : '') + out.phone.num).trim();
  }

  // Meta: gera um eventID e dispara o Pixel (browser). O MESMO id vai pro n8n,
  // que dispara o Lead pela CAPI (server). É isso que deduplica os dois lados.
  const eventId = genEventId();
  if(typeof fbq !== 'undefined'){
    fbq('track','Lead', { content_name:'Sales Rep Application' }, { eventID: eventId });
  }

  const payload = {
    submittedAt: new Date().toISOString(),
    answers: out,
    meta: {
      eventId: eventId,
      fbp: getCookie('_fbp'),
      fbc: getFbc(),
      userAgent: navigator.userAgent,
      sourceUrl: location.href
    }
  };

  const done = () => { step = activeQuestions().length - 1; render(); };
  const fail = () => {
    card.innerHTML=`<div class="step active">
      <div class="qtext">Something went wrong.</div>
      <div class="qhint">Please try again in a moment.</div>
      <div class="actions"><button class="btn" onclick="submit()">Try again ${ICON_ARROW}</button></div>
    </div>`;
  };

  try {
    const res = await fetch(WEBHOOK_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    // n8n retorna 200 mesmo sem body — qualquer 2xx é sucesso
    if(res.ok){ done(); } else { fail(); }
  } catch(e) {
    // Se o n8n não retornar CORS headers, o fetch vai falhar mesmo que a
    // requisição chegue. Nesse caso assumimos sucesso para não travar o usuário.
    done();
  }
}

function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
render();
</script>
